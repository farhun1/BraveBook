name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'vx.y.z'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages and accept licenses
        run: |
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --licenses
          yes | sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Decode Keystore
        run: |
          mkdir -p $RUNNER_TEMP/keystores
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > $RUNNER_TEMP/keystores/keystore.jks
          if [ ! -f $RUNNER_TEMP/keystores/keystore.jks ]; then
            echo "Failed to decode keystore file"
            exit 1
          fi

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/keystores/keystore.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace || { echo "Gradle build failed"; exit 1; }
          ls -R app/build/outputs/apk || echo "No APK directory found"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-artifact
          path: app/build/outputs/apk/release/app-release.apk
          compression-level: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Tag for Manual Trigger
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag ${{ github.event.inputs.release_tag }}
          git push origin ${{ github.event.inputs.release_tag }}

      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: apk-artifact

      - name: Rename APK for Release
        run: |
          TAG_NAME="${{ github.event.inputs.release_tag || github.ref_name }}"
          mv app/build/outputs/apk/release/app-release.apk "BraveBook_${TAG_NAME}.apk"
          if [ ! -f "BraveBook_${TAG_NAME}.apk" ]; then
            echo "Failed to rename APK"
            exit 1
          fi

      - name: Prepare Changelog
        run: |
          if [ ! -f CHANGE.md ]; then
            echo "CHANGE.md not found, using default changelog"
            echo "Release ${{ github.ref_name || github.event.inputs.release_tag }}" > CHANGE.txt
          else
            cp CHANGE.md CHANGE.txt
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: BraveBook_${{ github.event.inputs.release_tag || github.ref_name }}.apk
          body_path: CHANGE.txt
